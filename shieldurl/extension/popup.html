<!doctype html>
<html>
<head>
<meta charset="UTF-8"/>
<style>
* { box-sizing:border-box; margin:0; padding:0; font-family:-apple-system,sans-serif; }
body { width:340px; padding:16px; background:#fff; color:#1e293b; }
.header { display:flex; align-items:center; gap:8px; margin-bottom:16px; }
.header h1 { font-size:16px; font-weight:700; }
.input-row { display:flex; gap:8px; margin-bottom:12px; }
input { flex:1; padding:8px 12px; border:1.5px solid #e2e8f0; border-radius:8px; font-size:13px; outline:none; }
input:focus { border-color:#3b82f6; }
button { padding:8px 16px; background:#0f172a; color:#fff; border:none; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; white-space:nowrap; }
button:disabled { background:#94a3b8; }
.result { background:#f8fafc; border-radius:10px; padding:14px; border:1px solid #e2e8f0; }
.badge { display:inline-flex; align-items:center; gap:6px; padding:6px 14px; border-radius:6px; font-weight:700; font-size:14px; margin-bottom:10px; }
.badge.safe       { background:#dcfce7; color:#166534; }
.badge.suspicious { background:#fef9c3; color:#854d0e; }
.badge.dangerous  { background:#fee2e2; color:#991b1b; }
.row { display:flex; justify-content:space-between; font-size:12px; padding:3px 0; border-bottom:1px solid #f1f5f9; }
.row:last-child { border:none; }
.lbl { color:#64748b; }
.url-preview { font-size:11px; color:#94a3b8; word-break:break-all; margin-bottom:8px; }
.loading { text-align:center; padding:20px; color:#64748b; font-size:14px; }
</style>
</head>
<body>
<div class="header">
  <span style="font-size:20px">🛡️</span>
  <h1>ShieldURL</h1>
</div>

<div class="input-row">
  <input id="urlInput" type="text" placeholder="Paste URL to scan…" />
  <button id="scanBtn">Scan</button>
</div>

<div id="output"></div>

<script>
const API = "http://localhost:3001";

async function scan(url) {
  const out = document.getElementById("output");
  out.innerHTML = '<div class="loading">Scanning…</div>';

  try {
    const res  = await fetch(`${API}/api/analyze`, {
      method:  "POST",
      headers: {"Content-Type":"application/json"},
      body:    JSON.stringify({ url }),
    });
    const data = await res.json();
    const emojiMap = { safe:"✅", suspicious:"⚠️", dangerous:"🚨" };

    out.innerHTML = `
      <div class="result">
        <span class="badge ${data.riskLevel}">${emojiMap[data.riskLevel]} ${data.riskLevel.charAt(0).toUpperCase()+data.riskLevel.slice(1)}</span>
        <div class="url-preview">${url.slice(0,60)}${url.length>60?"…":""}</div>
        <div class="row"><span class="lbl">AI phishing score</span><span>${Math.round(data.ml.score*100)}%</span></div>
        <div class="row"><span class="lbl">VirusTotal flags</span><span>${data.virustotal.positives}/${data.virustotal.total||"—"}</span></div>
        <div class="row"><span class="lbl">Server country</span><span>${data.ip?.country||"—"}</span></div>
        <div class="row"><span class="lbl">HTTPS</span><span>${data.ml.features?.is_https?"Yes":"No"}</span></div>
      </div>
    `;
  } catch {
    out.innerHTML = '<div class="loading" style="color:#ef4444">Backend offline. Start the server!</div>';
  }
}

document.getElementById("scanBtn").addEventListener("click", () => {
  const url = document.getElementById("urlInput").value.trim();
  if (url) scan(url);
});

document.getElementById("urlInput").addEventListener("keydown", e => {
  if (e.key === "Enter") {
    const url = e.target.value.trim();
    if (url) scan(url);
  }
});

// Auto-scan if opened via right-click
chrome.storage.local.get(["pendingUrl"], (res) => {
  if (res.pendingUrl) {
    document.getElementById("urlInput").value = res.pendingUrl;
    chrome.storage.local.remove("pendingUrl");
    scan(res.pendingUrl);
  }
});
</script>
</body>
</html>
